<!DOCTYPE html>
<html>
    <head>
        <meta charset = "utf-8">
        <title>모바일 프로그래밍</title>
        <style>
            body {background-color : linen; color :slategrey;
                    margin-left : 40px; margin-right : 40px;}
            h3 { text-align : center; color : rosybrown;}
            hr { height : 1px; border :darkgray;
                    background-color :grey}
            span { color :cadetblue; font-size : 20px;}
        </style>
        <script>
            function show() { // <img>에 이미지 달기
                document.getElementByld("fig").src = "ElvisPresley.png"
            }
            function hide() { // <img>에 이미지 제거
                document.getElementByld("fig").src="";
            }
        </script>
    </head>
    <body>
        <h3 onmouseover = "show()" onmouseout = "hide()">
            김현지</h3>
        <hr>
        <div><img id="fig" src=""></div>
        <span>오늘 할 일</span>
        <br>
        - 시각데이터처리 과제
        <br>
        
    </body>
</html>
